name: Deploy to GAS

# main への push のみで起動する（main 以外の push / PR / 手動では起動しない）。
# 要件 1.1（main push で自動起動）/ 1.2（main 以外は非起動）
on:
  push:
    branches: [main]

# deploy を直列化し、連続 push 時の clasp push 並走を防ぐ。
# cancel-in-progress: false により実行中のデプロイは中断せず順番に処理する。
# 要件 1.3（手動操作なしで一貫実行）の前提となる直列実行制御
concurrency:
  group: deploy-gas
  cancel-in-progress: false

jobs:
  # 既存テストスイートをデプロイゲートとして実行する。
  # 外部依存（npm dependencies）が無いためインストール手順は不要。
  # 要件 2.1（デプロイ前にテスト実行）/ 5.1（各ステップ成否をログ化）
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test
